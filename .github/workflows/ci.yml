name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Syntax check
        run: python -m py_compile src/nous/evolve_skills.py src/nous/skill_genome.py src/compaction_tracker/core.py src/compaction_tracker/analyze.py
      - name: Run benchmark dry-run
        run: PYTHONPATH=src python -m nous.evolve_skills --skill compaction-cost --root . --dry-run --judge deterministic
